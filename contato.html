<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">

<body>
	<p id="MENU"><small><a href="index.html">Introdução</a> | <a href="integrantes.html">Membros da banda</a> | Contato</small></p>
	<hr>

<h1>Cadastro para procurar bandas:</h1>
	<fieldset>
		<legend><i>Informações</i></legend>
		
		<label for="nome">Nome:</label><br>
		<input type="text" name="nome" id="nome" placeholder="Digite seu nome" required><br>
		
		<br>

		<label for="inst">Instrumento:</label><br>
		<select name="inst" required>
			<option value="inst"></option>
			<option value="inst">Guitarra</option>
			<option value="inst">Baixo</option>
			<option value="inst">Bateria</option>
			<option value="inst">Vocal</option>
		</select>
		
		<br><br>
		
		<label for="dtnasc">Data de nascimento:</label><br>
		<input type="date" name="dtnasc" id="dtnasc"required><br>
		
		<br>

		<label for="cidade">Cidade:</label><br>
		<input type="text" id="cidade" name="cidade" placeholder="Digite sua cidade"><br>
		
		<br>

		<label for="foto">Anexe uma foto sua:</label><br>
		<input type="file" name="foto" id="foto">
	</fieldset>
	
	<fieldset>
		<legend><i>Cadastro</i></legend>
		
		<label for="email">Email:</label><br>
		<input type="email" name="email" id="email" placeholder="Digite seu email" required><br>
		
		<br>

		<label for="senha">Senha</label><br>
		<input type="password" name="senha" id="senha" placeholder="Digite uma senha" required><br>
		
		<br>
		
		<input type="submit" name="cadastro" id="cadastro" value="Cadastrar">
	</fieldset>

</body>
</html>
